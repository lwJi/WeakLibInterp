name: CI

# One run per commit on every branch push; merges to main are covered by the
# push event on main itself. No pull_request trigger, so PR commits are not
# double-run.
on:
  push:

# Supersede in-flight runs when a branch tip moves, but never cancel main.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Pinned sibling-repo revisions (specs/fixtures/tables.provenance pins the
  # weaklib table layout; these pin the CI checkouts). Bump deliberately.
  AMREX_REF: 5fbc49bce6ccaaefd771c7594e24e0ef46d5e01c
  WEAKLIB_REF: 5836de983d2ea1305af31bf971099702759b1889
  # The compile-only GPU jobs below pin upstream vendor toolchain images by
  # exact tag (nvidia/cuda:12.6.3-devel-ubuntu24.04, rocm/dev-ubuntu-24.04:6.4.1)
  # in their container.image fields — bump those deliberately, like the refs.

jobs:
  validate-specs:
    name: Spec validation (default mode)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout WeakLibInterp
        uses: actions/checkout@v4
        with:
          path: WeakLibInterp

      - name: Checkout pinned AMReX
        uses: actions/checkout@v4
        with:
          repository: AMReX-Codes/amrex
          ref: ${{ env.AMREX_REF }}
          path: amrex

      - name: Checkout pinned weaklib
        uses: actions/checkout@v4
        with:
          repository: starkiller-astro/weaklib
          ref: ${{ env.WEAKLIB_REF }}
          path: weaklib

      # Default mode: no WL_TABLES_ROOT, so the live-table refresh stage
      # prints SKIPPED by design; everything else must pass.
      - name: Validate specs
        working-directory: WeakLibInterp
        env:
          AMREX_ROOT: ${{ github.workspace }}/amrex
          WEAKLIB_ROOT: ${{ github.workspace }}/weaklib
        run: bash specs/tools/validate_specs.sh

  build-test:
    name: Build + ctest (double precision)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout WeakLibInterp
        uses: actions/checkout@v4
        with:
          path: WeakLibInterp

      - name: Checkout pinned AMReX
        uses: actions/checkout@v4
        with:
          repository: AMReX-Codes/amrex
          ref: ${{ env.AMREX_REF }}
          path: amrex

      - name: Install HDF5
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libhdf5-dev

      # AMReX compilation dominates CI time; ccache keyed on the pinned AMReX
      # revision turns the ~15-20 min cold build into a few minutes warm.
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: amrex-${{ env.AMREX_REF }}
          max-size: 1G

      - name: Configure
        run: >
          cmake -S WeakLibInterp -B WeakLibInterp/build
          -DCMAKE_BUILD_TYPE=Release
          -DWLI_AMREX_ROOT="${GITHUB_WORKSPACE}/amrex"
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build WeakLibInterp/build --parallel 4

      # Production-table tests return 77 (SKIP) with WL_TABLES_ROOT unset;
      # the synthetic-table suite is the always-on signal.
      - name: Run regression suite
        run: ctest --test-dir WeakLibInterp/build --output-on-failure

  # Correctness-gating MPI tier: a second (AMReX_MPI=ON) tree that actually
  # runs ctest — unlike the compile-only GPU jobs, MPI parallelism runs on the
  # CPU runner, so this job exercises the 1/2/4-rank suite for real. Bare
  # runs-on (non-root runner) keeps plain --oversubscribe sufficient; no
  # container / --allow-run-as-root needed (specs/build-integration.md §61,72).
  build-test-mpi:
    name: Build + ctest (MPI, 2/4 ranks)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout WeakLibInterp
        uses: actions/checkout@v4
        with:
          path: WeakLibInterp

      - name: Checkout pinned AMReX
        uses: actions/checkout@v4
        with:
          repository: AMReX-Codes/amrex
          ref: ${{ env.AMREX_REF }}
          path: amrex

      # OpenMPI (libopenmpi-dev/openmpi-bin) puts mpiexec on PATH so the
      # if(WLI_AMREX_MPI) find_package(MPI REQUIRED COMPONENTS CXX) resolves.
      - name: Install HDF5 and MPI
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libhdf5-dev libopenmpi-dev openmpi-bin

      # AMReX_MPI=ON is a distinct AMReX compile, so it needs its own ccache
      # key separate from build-test's amrex-<ref>.
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: amrex-mpi-${{ env.AMREX_REF }}
          max-size: 1G

      - name: Configure (MPI)
        run: >
          cmake -S WeakLibInterp -B WeakLibInterp/build-mpi
          -DCMAKE_BUILD_TYPE=Release
          -DWLI_AMREX_MPI=ON
          -DWLI_AMREX_ROOT="${GITHUB_WORKSPACE}/amrex"
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build WeakLibInterp/build-mpi --parallel 4

      # One unfiltered ctest covers all three rank tiers: bare test names run
      # at 1 rank via the global CMAKE_TEST_LAUNCHER, and every _np2/_np4 name
      # is separately registered. Production-table tests SKIP (77) with
      # WL_TABLES_ROOT unset, as in build-test.
      - name: Run regression suite (1/2/4 ranks)
        run: ctest --test-dir WeakLibInterp/build-mpi --output-on-failure

  # Compile-only GPU checks (CarpetX model): build the library + full suite
  # with the device compiler to catch missing AMREX_GPU_HOST_DEVICE qualifiers
  # and host-only calls in device code. No ctest — runners have no GPU; the
  # CPU build-test job above stays the correctness-bearing gate
  # (specs/build-integration.md).
  build-cuda:
    name: Build (CUDA compile check, sm_80)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: nvidia/cuda:12.6.3-devel-ubuntu24.04
    steps:
      # The devel image has gcc/nvcc but not cmake/git/HDF5.
      - name: Install toolchain
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates cmake g++ git libhdf5-dev

      - name: Checkout WeakLibInterp
        uses: actions/checkout@v4
        with:
          path: WeakLibInterp

      - name: Checkout pinned AMReX
        uses: actions/checkout@v4
        with:
          repository: AMReX-Codes/amrex
          ref: ${{ env.AMREX_REF }}
          path: amrex

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: amrex-cuda-${{ env.AMREX_REF }}
          max-size: 2G

      - name: Configure (CUDA)
        run: >
          cmake -S WeakLibInterp -B WeakLibInterp/build
          -DCMAKE_BUILD_TYPE=Release
          -DWLI_GPU_BACKEND=CUDA
          -DWLI_AMREX_ROOT="${GITHUB_WORKSPACE}/amrex"
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DCMAKE_CUDA_COMPILER_LAUNCHER=ccache

      - name: Build (no ctest — no GPU on the runner)
        run: cmake --build WeakLibInterp/build --parallel 4

  build-rocm:
    name: Build (ROCm compile check, gfx90a)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: rocm/dev-ubuntu-24.04:6.4.1
    steps:
      # The dev image has the ROCm/HIP toolchain but not cmake/git/HDF5;
      # g++ supplies the libstdc++ headers amdclang++ compiles against.
      # rocrand/rocprim/hiprand dev packages (from the image's ROCm apt repo)
      # satisfy AMReX's HIP-backend find_package(rocrand/rocprim/hiprand)
      # (amrex/Tools/CMake/AMReXParallelBackends.cmake:309-311); rocsparse is
      # not needed because AMReX_LINEAR_SOLVERS is forced OFF.
      - name: Install toolchain
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates cmake g++ git libhdf5-dev \
            rocrand-dev rocprim-dev hiprand-dev

      - name: Checkout WeakLibInterp
        uses: actions/checkout@v4
        with:
          path: WeakLibInterp

      - name: Checkout pinned AMReX
        uses: actions/checkout@v4
        with:
          repository: AMReX-Codes/amrex
          ref: ${{ env.AMREX_REF }}
          path: amrex

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: amrex-rocm-${{ env.AMREX_REF }}
          max-size: 2G

      # AMReX requires an AMD/Cray HIP compiler as CMAKE_CXX_COMPILER for HIP
      # builds; CMAKE_PREFIX_PATH lets find_package(hip) resolve the ROCm
      # CMake packages under /opt/rocm.
      - name: Configure (HIP)
        run: >
          cmake -S WeakLibInterp -B WeakLibInterp/build
          -DCMAKE_BUILD_TYPE=Release
          -DWLI_GPU_BACKEND=HIP
          -DCMAKE_CXX_COMPILER=/opt/rocm/bin/amdclang++
          -DCMAKE_PREFIX_PATH=/opt/rocm
          -DWLI_AMREX_ROOT="${GITHUB_WORKSPACE}/amrex"
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build (no ctest — no GPU on the runner)
        run: cmake --build WeakLibInterp/build --parallel 4

  # Cactus/ET consumption rehearsal (specs/cactus-integration.md Verification
  # #1-#3): consume AMReX as a pre-built INSTALL prefix instead of the sibling
  # source tree. Builds a CPU-only/double AMReX install, then exercises the
  # three installed-AMReX contracts in separate build trees (never colliding
  # with build-test's build/): (#1) full library+suite build & unfiltered ctest
  # in installed mode; (#2) the config-consistency guard hard-errors when a
  # CUDA backend is requested against the NONE install; (#3) a tests-off WLI
  # install links from a bare -I/-L prefix (no CMake package-config, spec:51)
  # via a scratch translation unit. Verification #4 (default build/ unchanged)
  # is already covered by build-test, so it is intentionally not repeated here.
  build-test-installed-amrex:
    name: Installed-AMReX rehearsal
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout WeakLibInterp
        uses: actions/checkout@v4
        with:
          path: WeakLibInterp

      - name: Checkout pinned AMReX
        uses: actions/checkout@v4
        with:
          repository: AMReX-Codes/amrex
          ref: ${{ env.AMREX_REF }}
          path: amrex

      - name: Install HDF5
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libhdf5-dev

      # Distinct ccache key: the CPU-only/double install build here is a third
      # AMReX configuration, separate from amrex-<ref> and amrex-mpi-<ref>.
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: amrex-installed-${{ env.AMREX_REF }}
          max-size: 1G

      # Step A (Verification #1 prep): build+install a CPU-only, double, no-MPI
      # AMReX into amrex-prefix. No GPU/MPI here so the guard in Step C trips on
      # a backend MISMATCH, not on a missing CUDA compiler.
      - name: Build + install AMReX (CPU-only, double)
        run: >
          cmake -S amrex -B amrex-build
          -DCMAKE_BUILD_TYPE=Release
          -DAMReX_MPI=OFF
          -DAMReX_LINEAR_SOLVERS=OFF
          -DAMReX_AMRLEVEL=OFF
          -DAMReX_PARTICLES=OFF
          -DAMReX_TINY_PROFILE=OFF
          -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/amrex-prefix"
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          && cmake --build amrex-build --parallel 4 --target install

      # Step B (Verification #1): configure/build the full library + suite in
      # installed-AMReX mode and run unfiltered ctest. Tolerance tiers are
      # enforced inside the test binaries; production-table cells SKIP (77) with
      # WL_TABLES_ROOT unset, exactly as in build-test.
      - name: Configure (installed-AMReX mode)
        run: >
          cmake -S WeakLibInterp -B WeakLibInterp/build-installed
          -DCMAKE_BUILD_TYPE=Release
          -DWLI_AMREX_INSTALL_DIR="${GITHUB_WORKSPACE}/amrex-prefix"
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build (installed-AMReX mode)
        run: cmake --build WeakLibInterp/build-installed --parallel 4

      - name: Run regression suite (installed-AMReX mode)
        run: ctest --test-dir WeakLibInterp/build-installed --output-on-failure

      # Step C (Verification #2): the config-consistency guard must hard-error
      # at configure when the requested WLI_GPU_BACKEND (CUDA) disagrees with
      # the NONE backend recorded by the install — naming both values. Invert
      # the exit status: a SUCCESSFUL configure is the failure here.
      - name: Config-consistency guard trips on backend mismatch
        run: |
          if cmake -S WeakLibInterp -B WeakLibInterp/build-guard \
               -DCMAKE_BUILD_TYPE=Release \
               -DWLI_AMREX_INSTALL_DIR="${GITHUB_WORKSPACE}/amrex-prefix" \
               -DWLI_GPU_BACKEND=CUDA >guard.log 2>&1; then
            echo "ERROR: expected configure to FAIL on backend mismatch but it succeeded"
            cat guard.log
            exit 1
          fi
          echo "configure failed as expected; checking for the guard diagnostic"
          grep -q "AMReX GPU-backend mismatch" guard.log

      # Step D (Verification #3): install WLI tests-off (library-only) into
      # wli-prefix — libwli_lib.a + a flat include/ of the public wli_*.H — then
      # compile & link a scratch TU against that bare prefix (no CMake
      # package-config is installed, spec:51). The scratch TU includes one
      # header per family and odr-uses the library anchor to force linking.
      - name: Install WeakLibInterp (tests-off, installed-AMReX mode)
        run: >
          cmake -S WeakLibInterp -B WeakLibInterp/build-notests
          -DCMAKE_BUILD_TYPE=Release
          -DWLI_BUILD_TESTS=OFF
          -DWLI_AMREX_INSTALL_DIR="${GITHUB_WORKSPACE}/amrex-prefix"
          -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/wli-prefix"
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          && cmake --build WeakLibInterp/build-notests --parallel 4 --target install

      - name: Scratch-TU compile+link against installed prefix
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/scratch"
          cd "${GITHUB_WORKSPACE}/scratch"
          cat > scratch.cpp <<'CPP'
          // Consumer-side smoke test: the flat installed headers must compile
          // against the AMReX prefix, and libwli_lib.a must link from a bare
          // -I/-L prefix with no CMake package-config. Header entry points are
          // AMREX_GPU_HOST_DEVICE AMREX_FORCE_INLINE, so odr-using their address
          // behind a never-taken branch forces the compile without table data;
          // wli::wli_value_type_size() is the only .cpp-defined symbol and is
          // what actually forces the archive to link.
          #include "wli_eos.H"
          #include "wli_eos_inversion.H"
          #include "wli_opacity.H"
          namespace wli { int wli_value_type_size(); }
          int main(int argc, char**) {
            if (argc < 0) {
              (void)&wli::EosInterpolateSingleVariable3DPoint;
              (void)&wli::ComputeTemperatureWith_DEY_NoGuess;
              (void)&wli::EmAbInterpolateSingleVariable4DPoint;
              (void)&wli::IsoInterpolateSingleVariable5DPoint;
              (void)&wli::NESPairInterpolateSingleVariable2D2DAlignedPoint;
              (void)&wli::BremInterpolateSingleDensity2DAlignedPoint;
            }
            return wli::wli_value_type_size() == 8 ? 0 : 1;
          }
          CPP
          cat > CMakeLists.txt <<'CML'
          cmake_minimum_required(VERSION 3.20)
          project(wli_scratch CXX)
          find_package(AMReX REQUIRED CONFIG)
          find_package(HDF5 REQUIRED COMPONENTS C CXX)
          add_executable(scratch scratch.cpp)
          target_include_directories(scratch PRIVATE
            $ENV{GITHUB_WORKSPACE}/wli-prefix/include ${HDF5_INCLUDE_DIRS})
          target_link_libraries(scratch PRIVATE
            $ENV{GITHUB_WORKSPACE}/wli-prefix/lib/libwli_lib.a AMReX::amrex)
          if(TARGET hdf5::hdf5_cpp)
            target_link_libraries(scratch PRIVATE hdf5::hdf5_cpp)
          else()
            target_link_libraries(scratch PRIVATE ${HDF5_CXX_LIBRARIES})
          endif()
          if(TARGET hdf5::hdf5)
            target_link_libraries(scratch PRIVATE hdf5::hdf5)
          else()
            target_link_libraries(scratch PRIVATE ${HDF5_C_LIBRARIES})
          endif()
          CML
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/amrex-prefix" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --parallel 4
          ./build/scratch
