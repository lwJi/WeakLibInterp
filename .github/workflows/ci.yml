name: CI

# One run per commit on every branch push; merges to main are covered by the
# push event on main itself. No pull_request trigger, so PR commits are not
# double-run.
on:
  push:

# Supersede in-flight runs when a branch tip moves, but never cancel main.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Pinned sibling-repo revisions (specs/fixtures/tables.provenance pins the
  # weaklib table layout; these pin the CI checkouts). Bump deliberately.
  AMREX_REF: 5fbc49bce6ccaaefd771c7594e24e0ef46d5e01c
  WEAKLIB_REF: 5836de983d2ea1305af31bf971099702759b1889
  # The compile-only GPU jobs below pin upstream vendor toolchain images by
  # exact tag (nvidia/cuda:12.6.3-devel-ubuntu24.04, rocm/dev-ubuntu-24.04:6.4.1)
  # in their container.image fields — bump those deliberately, like the refs.

# Vocabulary identity: every AMReX-consuming job speaks the exact commands a
# developer types locally — restore-cache → tools/provision-amrex.sh <config>
# → tools/build.sh <preset> → tools/test.sh <preset> (CPU jobs only). No WLI
# cache flag is set anywhere in this file: flags live in CMakePresets.json,
# the AMReX flag base lives in tools/provision-amrex.sh.
#
# Caching holds the finished prefix store entry ($HOME/wli-amrex/<config>),
# not per-object compiles: a hit restores the installed prefix and the
# provisioner's skip-if-valid probe turns the provision step into a no-op; a
# miss exercises the identical provision-on-miss flow a fresh laptop does.
# Each key invalidates on exactly the two inputs that can change a prefix —
# the pinned AMREX_REF and the provisioner script's own content.

jobs:
  validate-specs:
    name: Spec validation (default mode)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout WeakLibInterp
        uses: actions/checkout@v4
        with:
          path: WeakLibInterp

      - name: Checkout pinned AMReX
        uses: actions/checkout@v4
        with:
          repository: AMReX-Codes/amrex
          ref: ${{ env.AMREX_REF }}
          path: amrex

      - name: Checkout pinned weaklib
        uses: actions/checkout@v4
        with:
          repository: starkiller-astro/weaklib
          ref: ${{ env.WEAKLIB_REF }}
          path: weaklib

      # Default mode: no WL_TABLES_ROOT, so the live-table refresh stage
      # prints SKIPPED by design; everything else must pass.
      - name: Validate specs
        working-directory: WeakLibInterp
        env:
          AMREX_ROOT: ${{ github.workspace }}/amrex
          WEAKLIB_ROOT: ${{ github.workspace }}/weaklib
        run: bash specs/tools/validate_specs.sh

  # The standing gate: the default preset (mpi prefix — MPI ON, GPU NONE,
  # DOUBLE), full ctest including the 1/2/4-rank tiers. Bare runs-on
  # (non-root runner) keeps the baked-in plain --oversubscribe sufficient; no
  # container / --allow-run-as-root needed. Production-table cells return 77
  # (SKIP) with WL_TABLES_ROOT unset; the synthetic-table suite is the
  # always-on signal. This job also absorbs the old installed-AMReX rehearsal
  # checks in the new vocabulary: the guard-trip preset (cactus-integration.md
  # V#2) and the library-only install + scratch-TU check (V#3). V#1
  # (installed-AMReX mode) needs no separate job — find-only IS the only mode.
  build-test:
    name: Build + ctest (default preset — MPI, 1/2/4 ranks)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout WeakLibInterp
        uses: actions/checkout@v4
        with:
          path: WeakLibInterp

      - name: Checkout pinned AMReX
        uses: actions/checkout@v4
        with:
          repository: AMReX-Codes/amrex
          ref: ${{ env.AMREX_REF }}
          path: amrex

      # OpenMPI (libopenmpi-dev/openmpi-bin) puts mpiexec on PATH so the
      # MPI-ON default resolves find_package(MPI REQUIRED COMPONENTS CXX).
      - name: Install HDF5 and MPI
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libhdf5-dev libopenmpi-dev openmpi-bin

      - name: Cache AMReX prefix store (mpi)
        uses: actions/cache@v4
        with:
          path: ~/wli-amrex/mpi
          key: amrex-mpi-${{ env.AMREX_REF }}-${{ hashFiles('WeakLibInterp/tools/provision-amrex.sh') }}

      # Unconditional: on a cache hit the provisioner's skip-if-valid probe
      # (AMReXConfig.cmake exists) prints the skip line and exits 0.
      - name: Provision AMReX (mpi)
        working-directory: WeakLibInterp
        env:
          AMREX_SRC: ${{ github.workspace }}/amrex
        run: tools/provision-amrex.sh mpi

      - name: Build (default preset)
        working-directory: WeakLibInterp
        run: tools/build.sh

      - name: Test (default preset)
        working-directory: WeakLibInterp
        run: tools/test.sh

      # Negative check (cactus-integration.md V#2): the config-consistency
      # guard must hard-error at configure when the requested backend (CUDA)
      # disagrees with the NONE backend the mpi prefix recorded — the
      # guard-trip preset exists solely for this. Invert the exit status: a
      # SUCCESSFUL configure is the failure here.
      - name: Consistency guard trips on backend mismatch (guard-trip preset)
        working-directory: WeakLibInterp
        run: |
          export WLI_AMREX_HOME="$HOME/wli-amrex"
          if cmake --preset guard-trip >guard.log 2>&1; then
            echo "ERROR: expected configure to FAIL on backend mismatch but it succeeded"
            cat guard.log
            exit 1
          fi
          echo "configure failed as expected; checking for the guard diagnostic"
          grep -q "AMReX GPU-backend mismatch" guard.log

      # Library-only install check (cactus-integration.md V#3): the notests
      # preset builds wli_lib alone; install yields lib/libwli_lib.a + a flat
      # include/ of the public wli_*.H — no CMake package-config by design
      # (spec:51) — then a scratch TU compiles, links, and runs from that bare
      # -I/-L prefix.
      - name: Build library-only (notests preset)
        working-directory: WeakLibInterp
        run: tools/build.sh notests

      - name: Install WeakLibInterp (library-only)
        run: cmake --install WeakLibInterp/build-notests --prefix "${GITHUB_WORKSPACE}/wli-prefix"

      - name: Scratch-TU compile+link against installed prefix
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/scratch"
          cd "${GITHUB_WORKSPACE}/scratch"
          cat > scratch.cpp <<'CPP'
          // Consumer-side smoke test: the flat installed headers must compile
          // against the AMReX prefix, and libwli_lib.a must link from a bare
          // -I/-L prefix with no CMake package-config. Header entry points are
          // AMREX_GPU_HOST_DEVICE AMREX_FORCE_INLINE, so odr-using their address
          // behind a never-taken branch forces the compile without table data;
          // wli::wli_value_type_size() is the only .cpp-defined symbol and is
          // what actually forces the archive to link.
          #include "wli_eos.H"
          #include "wli_eos_inversion.H"
          #include "wli_opacity.H"
          namespace wli { int wli_value_type_size(); }
          int main(int argc, char**) {
            if (argc < 0) {
              (void)&wli::EosInterpolateSingleVariable3DPoint;
              (void)&wli::ComputeTemperatureWith_DEY_NoGuess;
              (void)&wli::EmAbInterpolateSingleVariable4DPoint;
              (void)&wli::IsoInterpolateSingleVariable5DPoint;
              (void)&wli::NESPairInterpolateSingleVariable2D2DAlignedPoint;
              (void)&wli::BremInterpolateSingleDensity2DAlignedPoint;
            }
            return wli::wli_value_type_size() == 8 ? 0 : 1;
          }
          CPP
          cat > CMakeLists.txt <<'CML'
          cmake_minimum_required(VERSION 3.20)
          # C is enabled alongside CXX because the MPI-ON prefix's
          # AMReXConfig.cmake runs find_dependency(MPI REQUIRED C CXX).
          project(wli_scratch C CXX)
          find_package(AMReX REQUIRED CONFIG)
          find_package(HDF5 REQUIRED COMPONENTS C CXX)
          add_executable(scratch scratch.cpp)
          target_include_directories(scratch PRIVATE
            $ENV{GITHUB_WORKSPACE}/wli-prefix/include ${HDF5_INCLUDE_DIRS})
          target_link_libraries(scratch PRIVATE
            $ENV{GITHUB_WORKSPACE}/wli-prefix/lib/libwli_lib.a AMReX::amrex)
          if(TARGET hdf5::hdf5_cpp)
            target_link_libraries(scratch PRIVATE hdf5::hdf5_cpp)
          else()
            target_link_libraries(scratch PRIVATE ${HDF5_CXX_LIBRARIES})
          endif()
          if(TARGET hdf5::hdf5)
            target_link_libraries(scratch PRIVATE hdf5::hdf5)
          else()
            target_link_libraries(scratch PRIVATE ${HDF5_C_LIBRARIES})
          endif()
          CML
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$HOME/wli-amrex/mpi"
          cmake --build build --parallel 4
          ./build/scratch

  # The no-MPI variant: the bare-name 1-rank suite here is the
  # 1-rank == serial cross-check (test-name identity against build-test's
  # tree). Same restore → provision → build → test shape, serial config.
  build-test-serial:
    name: Build + ctest (serial preset — no MPI)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout WeakLibInterp
        uses: actions/checkout@v4
        with:
          path: WeakLibInterp

      - name: Checkout pinned AMReX
        uses: actions/checkout@v4
        with:
          repository: AMReX-Codes/amrex
          ref: ${{ env.AMREX_REF }}
          path: amrex

      - name: Install HDF5 and MPI
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libhdf5-dev libopenmpi-dev openmpi-bin

      - name: Cache AMReX prefix store (serial)
        uses: actions/cache@v4
        with:
          path: ~/wli-amrex/serial
          key: amrex-serial-${{ env.AMREX_REF }}-${{ hashFiles('WeakLibInterp/tools/provision-amrex.sh') }}

      - name: Provision AMReX (serial)
        working-directory: WeakLibInterp
        env:
          AMREX_SRC: ${{ github.workspace }}/amrex
        run: tools/provision-amrex.sh serial

      - name: Build (serial preset)
        working-directory: WeakLibInterp
        run: tools/build.sh serial

      - name: Test (serial preset)
        working-directory: WeakLibInterp
        run: tools/test.sh serial

  # Compile-only GPU checks (CarpetX model): build the library + full suite
  # with the device compiler to catch missing AMREX_GPU_HOST_DEVICE qualifiers
  # and host-only calls in device code. No ctest — runners have no GPU
  # (tools/test.sh refuses these presets anyway); the CPU build-test job above
  # stays the correctness-bearing gate (specs/build-integration.md).
  build-cuda:
    name: Build (CUDA compile check, sm_80)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: nvidia/cuda:12.6.3-devel-ubuntu24.04
    steps:
      # The devel image has gcc/nvcc but not cmake/git/HDF5/MPI; the cuda
      # config records MPI ON, so OpenMPI is needed like everywhere else.
      - name: Install toolchain
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates cmake g++ git libhdf5-dev libopenmpi-dev openmpi-bin

      - name: Checkout WeakLibInterp
        uses: actions/checkout@v4
        with:
          path: WeakLibInterp

      - name: Checkout pinned AMReX
        uses: actions/checkout@v4
        with:
          repository: AMReX-Codes/amrex
          ref: ${{ env.AMREX_REF }}
          path: amrex

      - name: Cache AMReX prefix store (cuda)
        uses: actions/cache@v4
        with:
          path: ~/wli-amrex/cuda
          key: amrex-cuda-${{ env.AMREX_REF }}-${{ hashFiles('WeakLibInterp/tools/provision-amrex.sh') }}

      - name: Provision AMReX (cuda)
        working-directory: WeakLibInterp
        env:
          AMREX_SRC: ${{ github.workspace }}/amrex
        run: tools/provision-amrex.sh cuda

      - name: Build (cuda preset — no ctest, no GPU on the runner)
        working-directory: WeakLibInterp
        run: tools/build.sh cuda

  build-rocm:
    name: Build (ROCm compile check, gfx90a)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: rocm/dev-ubuntu-24.04:6.4.1
    env:
      # AMReX requires an AMD/Cray HIP compiler as CMAKE_CXX_COMPILER for HIP
      # builds — the provisioner and the preset both take the toolchain from
      # the environment; CMAKE_PREFIX_PATH lets find_package(hip) resolve the
      # ROCm CMake packages under /opt/rocm.
      CXX: /opt/rocm/bin/amdclang++
      CMAKE_PREFIX_PATH: /opt/rocm
    steps:
      # The dev image has the ROCm/HIP toolchain but not cmake/git/HDF5/MPI;
      # g++ supplies the libstdc++ headers amdclang++ compiles against.
      # rocrand/rocprim/hiprand dev packages (from the image's ROCm apt repo)
      # satisfy AMReX's HIP-backend find_package(rocrand/rocprim/hiprand);
      # rocsparse is not needed because the provisioner keeps
      # AMReX_LINEAR_SOLVERS OFF.
      - name: Install toolchain
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates cmake g++ git libhdf5-dev libopenmpi-dev openmpi-bin \
            rocrand-dev rocprim-dev hiprand-dev

      - name: Checkout WeakLibInterp
        uses: actions/checkout@v4
        with:
          path: WeakLibInterp

      - name: Checkout pinned AMReX
        uses: actions/checkout@v4
        with:
          repository: AMReX-Codes/amrex
          ref: ${{ env.AMREX_REF }}
          path: amrex

      - name: Cache AMReX prefix store (hip)
        uses: actions/cache@v4
        with:
          path: ~/wli-amrex/hip
          key: amrex-hip-${{ env.AMREX_REF }}-${{ hashFiles('WeakLibInterp/tools/provision-amrex.sh') }}

      - name: Provision AMReX (hip)
        working-directory: WeakLibInterp
        env:
          AMREX_SRC: ${{ github.workspace }}/amrex
        run: tools/provision-amrex.sh hip

      - name: Build (rocm preset — no ctest, no GPU on the runner)
        working-directory: WeakLibInterp
        run: tools/build.sh rocm
